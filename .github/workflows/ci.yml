name: CI
on: { pull_request: { branches: [develop, main, master] }, push: { branches: [develop, main, master] } }
permissions: { contents: read }
env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x, cache: true }
      - run: dotnet restore OrbitWatch.slnx
      - run: dotnet build OrbitWatch.slnx -c Release --no-restore
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x, cache: true }
      - run: dotnet tool restore
      - run: dotnet format OrbitWatch.slnx --verify-no-changes --verbosity normal
      - run: dotnet csharpier check .
# ci.yml
  script:
    - dotnet tool restore
    - dotnet format --verify-no-changes --verbosity normal
    - dotnet csharpier check .