name: CI

on:
  pull_request:
  push:
    branches:
      - develop
      - main
      - master

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            .config/dotnet-tools.json

      - name: Restore
        run: dotnet restore OrbitWatch.slnx

      - name: Build
        run: dotnet build OrbitWatch.slnx --configuration Release --no-restore

  lint:
    name: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj
            .config/dotnet-tools.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore OrbitWatch.slnx

      - name: Verify dotnet format
        run: dotnet format OrbitWatch.slnx --verify-no-changes --verbosity diagnostic

      - name: Verify csharpier
        run: dotnet csharpier check .
